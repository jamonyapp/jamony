<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}
/* 背景光晕 */
.glow {
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0.12;
  pointer-events: none;
  animation: pulse 3s ease-in-out infinite alternate;
}
.glow-1 { top: -150px; left: -150px; background: #00aaff; }
.glow-2 { bottom: -150px; right: -150px; background: #ff33aa; animation-delay: 1.5s; }
@keyframes pulse {
  from { opacity: 0.06; transform: scale(1); }
  to { opacity: 0.15; transform: scale(1.2); }
}

/* 主容器 */
.container {
  text-align: center;
  animation: fadeScale 1s ease-out;
}
@keyframes fadeScale {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

/* Logo 图标 */
.logo-wrapper {
  width: 100px;
  height: 100px;
  margin: 0 auto 28px;
  border-radius: 24px;
  background: linear-gradient(135deg, #00aaff, #9933ff, #ff33aa, #bbee00);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 44px;
  font-weight: bold;
  color: #000;
  box-shadow: 0 0 60px rgba(0, 170, 255, 0.3);
  animation: logoGlow 2s ease-in-out infinite alternate;
}
@keyframes logoGlow {
  from { box-shadow: 0 0 40px rgba(0,170,255,0.3); }
  to { box-shadow: 0 0 80px rgba(153,51,255,0.5); }
}

/* 渐变文字标题 */
h1 {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 12px;
  background: linear-gradient(90deg, #00aaff, #9933ff, #ff33aa, #bbee00);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradientShift 3s ease infinite;
}
@keyframes gradientShift {
  0% { background-position: 0% center; }
  50% { background-position: 100% center; }
  100% { background-position: 0% center; }
}

/* 标语 */
.tagline {
  font-size: 15px;
  color: #8a8a8a;
  letter-spacing: 4px;
  opacity: 0;
  animation: fadeIn 1s ease 0.5s forwards;
}
@keyframes fadeIn {
  to { opacity: 1; }
}

/* 底部加载条 */
.loading-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.05);
}
.loading-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #00aaff, #9933ff, #ff33aa);
  animation: loadBar 3.5s ease-in-out forwards;
}
@keyframes loadBar {
  from { width: 0%; }
  to { width: 100%; }
}
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="container">
  <div class="logo-wrapper">J</div>
  <h1>jamony</h1>
  <p class="tagline">远程合奏，就这么简单</p>
</div>
<div class="loading-bar"><div class="loading-bar-fill"></div></div>
</body>
</html>
