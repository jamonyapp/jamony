<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'STKaiti', 'KaiTi', 'Noto Serif SC', 'SimSun', serif;
}

/* ============ 背景光晕（大气辉光） ============ */
.glow-bg {
  position: fixed;
  width: 500px;
  height: 500px;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0;
  pointer-events: none;
  animation: glowBgIn 2.5s ease 0.5s forwards;
}
.glow-bg-1 { top: -200px; left: -200px; background: #00AAFF; }
.glow-bg-2 { bottom: -200px; right: -200px; background: #FF33AA; }
@keyframes glowBgIn {
  from { opacity: 0; transform: scale(0.5); }
  to   { opacity: 0.10; transform: scale(1); }
}

/* ============ Logo 容器 ============ */
.container {
  text-align: center;
  position: relative;
}

/* ============ Logo 图像（霓虹灯管效果） ============ */
.logo {
  width: 280px;
  height: auto;
  display: block;
  opacity: 0;
  /* 多层霓虹辉光 —— 用 drop-shadow 沿 PNG 透明边缘发光 */
  animation:
    neonOn      1.5s ease 0.3s forwards,
    neonFlow    3s ease-in-out 1.5s infinite,
    neonFlicker 0.6s ease 2.8s 3;
}

/* 🌟 阶段一：霓虹点亮（0.3s → 1.8s） */
@keyframes neonOn {
  0% {
    opacity: 0;
    filter:
      drop-shadow(0 0 0px rgba(0,170,255,0))
      drop-shadow(0 0 0px rgba(153,51,255,0));
  }
  30% {
    opacity: 0.15;
    filter:
      drop-shadow(0 0 5px rgba(0,170,255,0.2))
      drop-shadow(0 0 15px rgba(153,51,255,0.1));
  }
  60% {
    opacity: 0.6;
    filter:
      drop-shadow(0 0 20px rgba(0,170,255,0.4))
      drop-shadow(0 0 50px rgba(153,51,255,0.25))
      drop-shadow(0 0 80px rgba(255,51,170,0.1));
  }
  100% {
    opacity: 1;
    filter:
      drop-shadow(0 0 25px rgba(0,170,255,0.6))
      drop-shadow(0 0 60px rgba(153,51,255,0.35))
      drop-shadow(0 0 100px rgba(255,51,170,0.15));
  }
}

/* 🌟 阶段二：光晕流动（品牌色循环） */
@keyframes neonFlow {
  0% {
    filter:
      drop-shadow(0 0 25px rgba(0,170,255,0.6))
      drop-shadow(0 0 60px rgba(153,51,255,0.35))
      drop-shadow(0 0 100px rgba(255,51,170,0.15));
  }
  25% {
    filter:
      drop-shadow(0 0 25px rgba(153,51,255,0.6))
      drop-shadow(0 0 60px rgba(255,51,170,0.35))
      drop-shadow(0 0 100px rgba(187,238,0,0.1));
  }
  50% {
    filter:
      drop-shadow(0 0 25px rgba(255,51,170,0.6))
      drop-shadow(0 0 60px rgba(187,238,0,0.35))
      drop-shadow(0 0 100px rgba(0,170,255,0.1));
  }
  75% {
    filter:
      drop-shadow(0 0 25px rgba(187,238,0,0.5))
      drop-shadow(0 0 60px rgba(0,170,255,0.35))
      drop-shadow(0 0 100px rgba(153,51,255,0.1));
  }
  100% {
    filter:
      drop-shadow(0 0 25px rgba(0,170,255,0.6))
      drop-shadow(0 0 60px rgba(153,51,255,0.35))
      drop-shadow(0 0 100px rgba(255,51,170,0.15));
  }
}

/* 🌟 阶段三：霓虹接触不良闪烁 */
@keyframes neonFlicker {
  0%   { opacity: 1; }
  15%  { opacity: 0.25; filter: drop-shadow(0 0 5px rgba(0,170,255,0.1)); }
  18%  { opacity: 0.9; }
  20%  { opacity: 0.15; filter: drop-shadow(0 0 2px rgba(0,170,255,0.05)); }
  23%  { opacity: 1; }
  30%  { opacity: 0.5; filter: drop-shadow(0 0 10px rgba(0,170,255,0.2)); }
  33%  { opacity: 1; }
  50%  { opacity: 0.6; filter: drop-shadow(0 0 15px rgba(153,51,255,0.25)); }
  53%  { opacity: 1; }
  100% { opacity: 1; }
}

/* ============ 标语 ============ */
.slogan {
  margin-top: 48px;
  font-size: 30px;
  font-weight: 800;
  color: #FFFFFF;
  letter-spacing: 8px;
  text-shadow: 0 0 20px rgba(255,255,255,0.15);
  opacity: 0;
  animation: sloganFadeIn 0.8s ease 1.8s forwards;
}
@keyframes sloganFadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============ 底部加载条 ============ */
.loading-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.04);
}
.loading-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #00AAFF, #9933FF, #FF33AA, #BBEE00);
  background-size: 200% 100%;
  animation: loadBar 4.5s ease-in-out forwards, loadBarShimmer 2s linear infinite;
}
@keyframes loadBar {
  from { width: 0%; }
  to   { width: 100%; }
}
@keyframes loadBarShimmer {
  from { background-position: 0% 0; }
  to   { background-position: 200% 0; }
}
</style>
</head>
<body>
<div class="glow-bg glow-bg-1"></div>
<div class="glow-bg glow-bg-2"></div>
<div class="container">
  <img src="icon.png" class="logo" alt="jamony">
  <p class="slogan">嘤其鸣矣，求其友声</p>
</div>
<div class="loading-bar"><div class="loading-bar-fill"></div></div>
</body>
</html>
