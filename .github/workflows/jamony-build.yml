name: jamony-demo-build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version tag (e.g. v0.1.0-alpha)'
        required: true
        default: 'v0.1.0-alpha'

jobs:
  build-macos:
    name: Build MacOS
    runs-on: macos-15-intel
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia'
          archives: 'qtbase qttools qttranslations'

      - name: Apply jamony color patch
        run: |
          patch -p1 < patches/jamony-colors.patch
          grep '#define APP_NAME' src/global.h

      - name: Build jamulus
        run: |
          qmake Jamulus.pro "CONFIG+=nosound" -r -spec macx-clang CONFIG+=x86_64 CONFIG+=arm64
          make -j$(sysctl -n hw.ncpu)
          mkdir -p dist/jamulus-bin
          cp Jamulus.app/Contents/MacOS/Jamulus dist/jamulus-bin/

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Electron app
        run: |
          cd electron
          npm install
          npx electron-builder --mac --config

      - uses: actions/upload-artifact@v4
        with:
          name: jamony-${{ github.event.inputs.version }}-macos
          path: |
            dist/*.dmg
            dist/**/*.dmg
          retention-days: 30
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'
          archives: 'qtbase qttools qttranslations'

      - name: Apply jamony color patch
        shell: bash
        run: |
          patch -p1 < patches/jamony-colors.patch
          grep '#define APP_NAME' src/global.h

      - name: Build jamulus
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          qmake Jamulus.pro "CONFIG+=nosound" -r -spec win32-msvc
          nmake
          mkdir dist\jamulus-bin
          copy release\Jamulus.exe dist\jamulus-bin\

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Electron app
        shell: cmd
        run: |
          cd electron
          npm install
          npx electron-builder --win --config

      - name: List dist contents
        if: always()
        shell: cmd
        run: dir dist /s /b 2>nul || echo "no dist dir"

      - uses: actions/upload-artifact@v4
        with:
          name: jamony-${{ github.event.inputs.version }}-windows
          path: |
            dist\*.exe
            dist\*.dmg
          retention-days: 30
          if-no-files-found: warn
