name: jamony-demo-build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version tag (e.g. v0.1.0-alpha)'
        required: true
        default: 'v0.1.0-alpha'

jobs:
  build-macos:
    name: Build MacOS
    runs-on: macos-15
    permissions:
      contents: write
    env:
      QT_VERSION: '6.10.2'
      JAMULUS_BUILD_VERSION: '0.1.0'
      TARGET_ARCHS: 'x86_64'
      SIGN_IF_POSSIBLE: '0'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply jamony color patch
        run: |
          patch -p1 < patches/jamony-colors.patch
          grep '#define APP_NAME' src/global.h

      - name: Install Qt
        run: ./.github/autobuild/mac.sh setup

      - name: Build jamulus
        run: ./.github/autobuild/mac.sh build

      - name: Extract jamulus binary
        run: |
          mkdir -p dist/jamulus-bin
          find deploy -name "Jamulus" -type f -exec cp {} dist/jamulus-bin/ \; 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Electron app
        run: |
          cd electron
          npm install
          npx electron-builder --mac --config

      - uses: actions/upload-artifact@v4
        with:
          name: jamony-${{ github.event.inputs.version }}-macos
          path: |
            dist/*.dmg
            electron/dist/*.dmg
          retention-days: 30
          if-no-files-found: warn

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'
          archives: 'qtbase qttools qttranslations'

      - name: Apply jamony color patch
        shell: bash
        run: |
          patch -p1 < patches/jamony-colors.patch
          grep '#define APP_NAME' src/global.h

      - name: Build jamulus
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          qmake Jamulus.pro "CONFIG+=nosound" -r -spec win32-msvc
          nmake
          mkdir dist\jamulus-bin
          copy release\Jamulus.exe dist\jamulus-bin\

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Electron app
        shell: cmd
        run: |
          cd electron
          npm install
          echo === Running electron-builder ===
          npx electron-builder --win --config --publish never
          echo === Done, exit code: %ERRORLEVEL% ===

      - name: Find artifacts
        shell: cmd
        run: |
          echo === electron dir contents ===
          dir electron /s /b | findstr /i "exe"
          echo === repo root dist ===
          dir /s /b | findstr /i "jamony.*exe"
          echo === generic search ===
          for /r C:\Users\runneradmin %i in (jamony*.exe) do echo %i
          dir dist /s /b

      - uses: actions/upload-artifact@v4
        with:
          name: jamony-${{ github.event.inputs.version }}-windows
          path: |
            dist\**\*
            electron\dist\**\*
          retention-days: 30
          if-no-files-found: warn
