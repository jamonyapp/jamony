name: jamony-demo-build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version tag (e.g. v0.1.0-alpha)'
        required: true
        default: 'v0.1.0-alpha'

jobs:
  build-macos:
    name: Build MacOS
    runs-on: macos-15
    permissions:
      contents: write
    env:
      QT_VERSION: '6.10.2'
      JAMULUS_BUILD_VERSION: '0.1.0'
      TARGET_ARCHS: 'x86_64'
      SIGN_IF_POSSIBLE: '0'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply jamony color patch
        run: |
          patch -p1 < patches/jamony-colors.patch
          grep '#define APP_NAME' src/global.h

      - name: Install Qt
        run: ./.github/autobuild/mac.sh setup

      - name: Build jamulus
        run: ./.github/autobuild/mac.sh build

      - name: Extract jamulus binary
        run: |
          mkdir -p dist/jamulus-bin
          find deploy -name "Jamulus" -type f -exec cp {} dist/jamulus-bin/ \; 2>/dev/null || true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Electron app
        run: |
          cd electron
          npm install
          npx electron-builder --mac --config

      - uses: actions/upload-artifact@v4
        with:
          name: jamony-${{ github.event.inputs.version }}-macos
          path: |
            dist/*.dmg
            electron/dist/*.dmg
          retention-days: 30
          if-no-files-found: warn

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'
          archives: 'qtbase qttools qttranslations'

      - name: Apply jamony color patch
        shell: bash
        run: |
          patch -p1 < patches/jamony-colors.patch
          grep '#define APP_NAME' src/global.h

      - name: Build jamulus
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          qmake Jamulus.pro "CONFIG+=nosound" -r -spec win32-msvc
          nmake
          mkdir dist\jamulus-bin
          copy release\Jamulus.exe dist\jamulus-bin\

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Diagnose electron-builder
        shell: cmd
        run: |
          cd electron
          npm install
          echo === DIAG 1: electron-builder version ===
          npx electron-builder --version
          echo === DIAG 2: requirement path ===
          node -e "try{console.log('require OK:',require.resolve('electron-builder'))}catch(e){console.log('require FAIL:',e.message)}"
          echo === DIAG 3: jamulus binary check ===
          if exist ..\dist\jamulus-bin\Jamulus.exe (echo binary OK) else (echo binary NOT FOUND)
          echo === DIAG 4: config parse ===
          npx electron-builder --win --config --publish never --help >nul 2>&1
          echo help exit: %ERRORLEVEL%

      - name: Build Electron app
        shell: cmd
        run: |
          cd electron
          echo === RUNNING electron-builder ===
          npx electron-builder --win --config --publish never 2>&1
          echo === EXIT CODE: %ERRORLEVEL% ===
          echo === checking outputs ===
          if exist ..\dist\ (dir ..\dist\*.exe ..\dist\*.dmg 2>nul) else (echo ..\dist NOT FOUND)
          if exist .\dist\ (dir .\dist\*.exe .\dist\*.dmg 2>nul) else (echo .\dist NOT FOUND)
          dir /s /b | findstr /i "exe" 2>nul

      - uses: actions/upload-artifact@v4
        with:
          name: jamony-${{ github.event.inputs.version }}-windows
          path: |
            dist\**\*
            electron\dist\**\*
          retention-days: 30
          if-no-files-found: warn
