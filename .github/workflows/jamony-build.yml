# Builds the jamony demo: Electron shell + color-modified jamulus
# Uses jamulus' existing build infrastructure (mac.sh + autobuild flow)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version tag (e.g. v0.1.0-alpha)'
        required: true
        default: 'v0.1.0-alpha'

name: jamony-demo-build

env:
  QT_VERSION: '6.10.2'

jobs:
  build-macos:
    name: Build MacOS
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply jamony color patch
        run: |
          echo "Applying jamony color modifications..."
          patch -p1 < patches/jamony-colors.patch
          grep '#define APP_NAME' src/global.h

      - name: Install Qt via mac.sh (setup stage)
        run: |
          QT_VERSION=6.10.2 TARGET_ARCHS="arm64 x86_64" ./.github/autobuild/mac.sh setup
        env:
          JAMULUS_BUILD_VERSION: '0.1.0'

      - name: Build jamulus (jamony edition) manually (qmake + make)
        run: |
          export QT_DIR=~/qt/6.10.2/clang_64
          export PATH=${QT_DIR}/bin:$PATH
          which qmake
          qmake Jamulus.pro "CONFIG+=nosound" -r -spec macx-clang CONFIG+=x86_64 CONFIG+=arm64
          make -j$(sysctl -n hw.ncpu)
          echo "=== Binary built ==="
          ls -lh Jamulus.app/Contents/MacOS/Jamulus

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Electron app
        run: |
          mkdir -p dist/jamulus-bin
          cp Jamulus.app/Contents/MacOS/Jamulus dist/jamulus-bin/
          cd electron
          npm install
          npx electron-builder --mac --config
          ls -lh ../dist/*.dmg 2>/dev/null || echo "no dmg yet"

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: jamony-${{ github.event.inputs.version }}-macos
          path: dist/*.dmg
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply jamony color patch
        run: |
          echo "Applying jamony color modifications..."
          patch -p1 < patches/jamony-colors.patch
          grep '#define APP_NAME' src/global.h
        shell: bash

      - name: Install Qt via aqt
        run: |
          python3 -m venv /tmp/qt-venv
          source /tmp/qt-venv/bin/activate
          pip install aqtinstall==3.3.0
          python3 -m aqt install-qt --outputdir ~/Qt windows desktop ${QT_VERSION} win64_msvc2022_64 --archives qtbase qttools qttranslations --modules qtmultimedia
          echo "QT_DIR=${HOME}/Qt/${QT_VERSION}/msvc2022_64" >> ${GITHUB_ENV}
        shell: bash

      - name: Build jamulus (jamony edition)
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          %QT_DIR%\bin\qmake.exe Jamulus.pro "CONFIG+=nosound" -r -spec win32-msvc
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          nmake
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
        shell: cmd

      - name: Copy jamulus binary
        run: |
          mkdir dist\jamulus-bin
          if exist release\Jamulus.exe (copy release\Jamulus.exe dist\jamulus-bin\) else (if exist Jamulus.exe copy Jamulus.exe dist\jamulus-bin\)
        shell: cmd

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Electron app
        run: |
          cd electron
          npm install
          npx electron-builder --win --config
        shell: cmd

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: jamony-${{ github.event.inputs.version }}-windows
          path: dist\*.exe
          retention-days: 30
