name: jamony-demo-build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version tag (e.g. v0.1.0-alpha)'
        required: true
        default: 'v0.1.0-alpha'

jobs:
  build-macos:
    name: Build MacOS
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: jamony-private

      - uses: actions/checkout@v6
        with:
          repository: jamonyapp/jamony-jamsoul
          fetch-depth: 1
          path: jamsoul-source

      - name: Apply jamony color patch
        run: |
          cp jamony-private/patches/jamony-colors.patch jamsoul-source/
          cd jamsoul-source
          patch -p1 < jamony-colors.patch
          grep '#define APP_NAME' src/global.h

      - name: Install Qt
        run: |
          cd jamsoul-source
          QT_VERSION=6.10.2 TARGET_ARCHS='x86_64 arm64' ./.github/autobuild/mac.sh setup
        env:
          JAMSOUL_BUILD_VERSION: '0.1.0'
          JAMULUS_BUILD_VERSION: '0.1.0'

      - name: Build jamsoul
        run: |
          cd jamsoul-source
          QT_VERSION=6.10.2 TARGET_ARCHS='x86_64 arm64' ./.github/autobuild/mac.sh build
        env:
          JAMSOUL_BUILD_VERSION: '0.1.0'
          JAMULUS_BUILD_VERSION: '0.1.0'

      - name: Extract jamsoul binary
        run: |
          mkdir -p jamony-private/dist/jamsoul-bin
          cp jamsoul-source/Jamulus.app/Contents/MacOS/Jamulus jamony-private/dist/jamsoul-bin/jamsoul 2>/dev/null || find jamsoul-source -name "Jamulus" -type f -not -path "*/deploy/*" | head -1 | while read f; do cp "$f" jamony-private/dist/jamsoul-bin/jamsoul; done
          ls -lh jamony-private/dist/jamsoul-bin/ 2>/dev/null

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Electron app
        run: |
          cd jamony-private/electron
          npm install
          npx electron-builder --mac --config

      - uses: actions/upload-artifact@v4
        with:
          name: jamony-${{ github.event.inputs.version }}-macos
          path: |
            jamony-private/electron/dist/*.dmg
            jamony-private/dist/*.dmg
          retention-days: 30
          if-no-files-found: warn

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: jamony-private

      - uses: actions/checkout@v6
        with:
          repository: jamonyapp/jamony-jamsoul
          fetch-depth: 1
          path: jamsoul-source

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia'
          archives: 'qtbase qttools qttranslations'

      - name: Apply jamony color patch
        shell: bash
        run: |
          cp jamony-private/patches/jamony-colors.patch jamsoul-source/
          cd jamsoul-source
          patch -p1 < jamony-colors.patch
          grep '#define APP_NAME' src/global.h

      - name: Build jamsoul
        shell: cmd
        run: |
          cd jamsoul-source
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          qmake Jamulus.pro "CONFIG+=nosound" -r -spec win32-msvc
          nmake
          mkdir ..\jamony-private\dist\jamsoul-bin
          copy release\Jamulus.exe ..\jamony-private\dist\jamsoul-bin\jamsoul.exe

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Electron app
        shell: pwsh
        run: |
          Set-Location jamony-private/electron
          npm install
          Write-Host "=== Running electron-builder ==="
          npx.cmd electron-builder --win --config --publish never 2>&1
          Write-Host "=== Exit code: $LASTEXITCODE ==="


      - name: Debug dist
        if: always()
        shell: bash
        run: |
          echo === jamony-private/dist ===
          find jamony-private/dist -name "*.exe" -ls 2>/dev/null || echo no exe found
          echo === electron dir ===
          ls jamony-private/electron/dist/ 2>/dev/null || echo no dir

      - uses: actions/upload-artifact@v4
        with:
          name: jamony-${{ github.event.inputs.version }}-windows
          path: |
            jamony-private/dist/jamony*Setup*.exe
          retention-days: 30
          if-no-files-found: warn
