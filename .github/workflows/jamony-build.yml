# Builds the jamony demo: Electron shell + color-modified jamulus
# Trigger: manual (workflow_dispatch) only
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version tag (e.g. v0.1.0-alpha)'
        required: true
        default: 'v0.1.0-alpha'

name: jamony-demo-build

env:
  QT_VERSION: '6.10.2'

jobs:
  build-macos:
    name: Build MacOS
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply jamony color patch
        run: |
          echo "Applying jamony color modifications..."
          patch -p1 < patches/jamony-colors.patch
          grep '#define APP_NAME' src/global.h

      - name: Install Qt via aqt
        run: |
          sudo mkdir -p ~/qt
          sudo chown "$(whoami)" ~/qt
          python3 -m venv /tmp/venv
          source /tmp/venv/bin/activate
          pip install aqtinstall==3.3.0
          python3 -m aqt install-qt --outputdir ~/qt mac desktop ${QT_VERSION} \
            --archives qtbase qttools qttranslations --modules qtmultimedia
          rm -rf /tmp/venv

      - name: Build jamulus (jamony edition)
        run: |
          export QT_DIR=~/qt/${QT_VERSION}/clang_64
          export PATH=${QT_DIR}/bin:$PATH
          qmake Jamulus.pro "CONFIG+=nosound" -r -spec macx-clang CONFIG+=x86_64 CONFIG+=arm64
          make -j$(sysctl -n hw.ncpu)
          mkdir -p dist/jamulus dist/jamulus-bin
          cp -r Jamulus.app dist/jamulus/
          cp dist/jamulus/Jamulus.app/Contents/MacOS/Jamulus dist/jamulus-bin/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Electron app
        run: |
          cd electron
          npm install
          npm run dist

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: jamony-${{ github.event.inputs.version }}-macos
          path: dist/jamony-*.dmg
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Apply jamony color patch
        run: |
          echo "Applying jamony color modifications..."
          patch -p1 < patches/jamony-colors.patch
          grep '#define APP_NAME' src/global.h
        shell: bash

      - name: Install Qt via aqt
        run: |
          python3 -m venv C:\tmp\venv
          C:\tmp\venv\Scripts\activate.bat
          pip install aqtinstall==3.3.0
          python3 -m aqt install-qt --outputdir ~/qt windows desktop %QT_VERSION% win64_msvc2022_64 --archives qtbase qttools qttranslations --modules qtmultimedia
          rmdir /s /q C:\tmp\venv
        shell: cmd

      - name: Build jamulus (jamony edition)
        run: |
          set QT_DIR=C:\Users\runneradmin\qt\%QT_VERSION%\msvc2022_64
          set PATH=%QT_DIR%\bin;%PATH%
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          call %QT_DIR%\bin\qmake.exe Jamulus.pro "CONFIG+=nosound" -r -spec win32-msvc
          nmake
          mkdir dist\jamulus dist\jamulus-bin
          copy release\Jamulus.exe dist\jamulus\
          copy release\Jamulus.exe dist\jamulus-bin\
        shell: cmd

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Electron app
        run: |
          cd electron
          npm install
          npm run dist
        shell: cmd

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: jamony-${{ github.event.inputs.version }}-windows
          path: dist\jamony-*.exe
          retention-days: 30
